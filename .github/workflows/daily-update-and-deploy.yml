name: Daily Market Signal

on:
  push:
    branches:
      - main
  schedule:
    # KST morning retries. GitHub scheduled workflows can be delayed or occasionally skipped.
    - cron: "20 23 * * *"
    - cron: "50 23 * * *"
    - cron: "20 0 * * *"
    - cron: "50 0 * * *"
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ai-market-signal-desk-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate scripts
        run: |
          node --check app.js
          node --check scripts/update-agenda-data.mjs

      - name: Check scheduled freshness
        id: freshness
        if: github.event_name == 'schedule'
        run: |
          TODAY="$(date +%F)"
          SNAPSHOT="$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('agenda-data.json','utf8')); console.log(data.metadata?.snapshotDate || '')")"
          if [ "$SNAPSHOT" = "$TODAY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already updated for $TODAY."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Current snapshot is $SNAPSHOT; updating for $TODAY."
          fi

      - name: Update agenda data
        if: github.event_name != 'schedule' || steps.freshness.outputs.skip != 'true'
        run: node scripts/update-agenda-data.mjs

      - name: Commit updated data
        if: github.event_name != 'schedule' || steps.freshness.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agenda-data.js agenda-data.json history signal-desk-screen-share.html signal-desk-screen-share.txt
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update daily agenda data"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Build Pages artifact
        if: github.event_name != 'schedule' || steps.freshness.outputs.skip != 'true'
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html styles.css app.js agenda-data.js agenda-data.json signal-desk-screen-share.html signal-desk-screen-share.txt README.md dist/
          cp -R history dist/history
          touch dist/.nojekyll

      - name: Configure Pages
        if: github.event_name != 'schedule' || steps.freshness.outputs.skip != 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'schedule' || steps.freshness.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: github.event_name != 'schedule' || steps.freshness.outputs.skip != 'true'
        id: deployment
        uses: actions/deploy-pages@v4
